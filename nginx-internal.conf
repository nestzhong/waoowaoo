# 内网服务器 Nginx 配置
# 用于 Docker 部署场景，接收公网 Nginx 转发或直接对外服务
#
# 使用方式：
# 1. 将此文件挂载到 Docker Nginx 容器的 /etc/nginx/conf.d/
# 2. 或直接在宿主机 Nginx 的 conf.d/ 目录中引用
#
# 子路径部署时，Next.js 的 basePath 会处理路径前缀，
# 因此 proxy_pass 不需要 rewrite 或剥离前缀

server {
    listen 80;
    server_name _;

    # Bull Board 队列管理面板
    # 访问地址：http://<host>/waoowaoo/admin/queues
    location /waoowaoo/admin/queues {
        proxy_pass http://127.0.0.1:13010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /waoowaoo;
    }

    # Next.js 应用
    # 访问地址：http://<host>/waoowaoo
    location /waoowaoo {
        proxy_pass http://127.0.0.1:13000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /waoowaoo;

        # WebSocket 支持（SSE 流式输出）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置（AI 视频生成可能较慢）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100m;
    }

    # 可选：根路径重定向到应用
    location = / {
        return 302 /waoowaoo;
    }
}
